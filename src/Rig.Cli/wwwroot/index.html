<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rig — explorer</title>
    <style>
      /* Semantic design tokens — the ONLY place colors are defined. data-theme on <html> selects the palette
         (set by the switcher); falls back to the OS preference. Components reference var(--x), never raw hex. */
      :root, :root[data-theme="dark"] {
        --bg: #0e1116; --panel: #161b22; --border: #2a3038; --fg: #d6dde6;
        --muted: #8b98a5; --accent: #58a6ff; --chip: #21262d; --warn: #d29922;
        --btn-fg: #0e1116; --hover: #1c2230; --danger: #f85149; --sel: #1f6feb33;
      }
      :root[data-theme="light"] {
        --bg: #ffffff; --panel: #f4f6f9; --border: #d8dee5; --fg: #1f2733;
        --muted: #6a7684; --accent: #0969da; --chip: #eaeef2; --warn: #9a6700;
        --btn-fg: #ffffff; --hover: #eef2f6; --danger: #cf222e; --sel: #0969da22;
      }
      @media (prefers-color-scheme: light) {
        :root:not([data-theme]) {
          --bg: #ffffff; --panel: #f4f6f9; --border: #d8dee5; --fg: #1f2733;
          --muted: #6a7684; --accent: #0969da; --chip: #eaeef2; --warn: #9a6700;
          --btn-fg: #ffffff; --hover: #eef2f6; --danger: #cf222e; --sel: #0969da22;
        }
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--fg);
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
      header h1 { font-size: 15px; margin: 0; letter-spacing: .5px; }
      header .store { color: var(--muted); font-size: 12px; }
      .placeholder { margin-left: auto; color: var(--warn); font-size: 11px; padding-right: 8px; }
      .theme { display: flex; gap: 2px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 2px; }
      .theme button { background: transparent; color: var(--muted); font-weight: 500; padding: 3px 9px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
      .theme button.on { background: var(--accent); color: var(--btn-fg); }
      main { display: grid; grid-template-columns: var(--rail, 300px) 5px 1fr; height: calc(100vh - 51px); }
      aside { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; min-width: 0; }
      .splitter { cursor: col-resize; background: transparent; }
      .splitter:hover, .splitter.drag { background: var(--accent); }
      .tabs { display: flex; border-bottom: 1px solid var(--border); }
      .tabs button { flex: 1; background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 9px; font: inherit; font-size: 12px; border-bottom: 2px solid transparent; }
      .tabs button.on { color: var(--fg); border-bottom-color: var(--accent); }
      .pane { flex: 1; overflow: auto; padding: 12px; display: none; }
      .pane.on { display: block; }
      .hint { color: var(--muted); font-size: 11px; margin-bottom: 8px; }
      .run { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; font-size: 12px; cursor: pointer; }
      .run:hover { border-color: var(--accent); }
      .run.active { border-color: var(--accent); background: var(--sel); }
      .run .id { font-weight: 600; }
      .run.latest .id::after { content: " ← latest"; color: var(--accent); font-weight: 400; }
      .run.active .id::before { content: "● "; color: var(--accent); }
      .run .meta { color: var(--muted); margin-top: 3px; }
      #epFilter { width: 100%; margin-bottom: 8px; }
      .kind { margin-bottom: 2px; }
      .kind > .khead { cursor: pointer; user-select: none; font-size: 12px; padding: 4px 2px; color: var(--fg); display: flex; gap: 6px; align-items: center; }
      .kind > .khead:hover { color: var(--accent); }
      .kind > .khead .kcount { color: var(--muted); font-size: 11px; }
      .kind .klist { display: none; }
      .kind.open .klist { display: block; }
      .ep { font-size: 12px; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .ep:hover { background: var(--hover); color: var(--fg); }
      section { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
      .controls { display: flex; gap: 8px; align-items: center; padding: 12px 18px; flex-wrap: wrap; border-bottom: 1px solid var(--border); position: relative; }
      input, select { background: var(--panel); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 7px 10px; font: inherit; font-size: 13px; }
      .fromwrap { position: relative; flex: 1; min-width: 240px; }
      input#from { width: 100%; }
      button.go { background: var(--accent); border: none; color: var(--btn-fg); font-weight: 600; border-radius: 6px; padding: 7px 14px; cursor: pointer; }
      button.go:disabled { opacity: .5; cursor: default; }
      label.chk { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 4px; }
      input#collapse { width: 92px; }
      /* search dropdown */
      #results { position: absolute; top: 100%; left: 0; right: 0; z-index: 30; background: var(--panel); border: 1px solid var(--border); border-radius: 0 0 6px 6px; max-height: 320px; overflow: auto; display: none; box-shadow: 0 8px 20px rgba(0,0,0,.25); }
      #results.show { display: block; }
      .hit { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
      .hit:hover, .hit.active { background: var(--hover); }
      .hit .hkind { color: var(--accent); font-size: 10px; }
      .hit .hfile { color: var(--muted); font-size: 10px; display: block; }
      /* multi-value filter selector */
      .ms { position: relative; }
      .ms-control { min-width: 150px; max-width: 320px; min-height: 33px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: text; }
      .ms.disabled .ms-control { opacity: .45; pointer-events: none; }
      .ms-ph { color: var(--muted); font-size: 13px; }
      .chip { background: var(--chip); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; padding: 1px 4px 1px 6px; display: inline-flex; align-items: center; gap: 4px; font-family: ui-monospace, Menlo, Consolas, monospace; }
      .chip b { cursor: pointer; color: var(--muted); font-weight: 700; }
      .chip b:hover { color: var(--danger); }
      .ms-pop { position: absolute; top: 100%; left: 0; z-index: 40; margin-top: 3px; width: 260px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: none; box-shadow: 0 8px 20px rgba(0,0,0,.25); }
      .ms.open .ms-pop { display: block; }
      .ms-search { width: calc(100% - 12px); margin: 6px; }
      .ms-list { max-height: 300px; overflow: auto; padding: 0 6px 6px; }
      .ms-opt { display: flex; align-items: center; gap: 6px; padding: 3px 4px; font-size: 12px; font-family: ui-monospace, Menlo, Consolas, monospace; border-radius: 4px; cursor: pointer; }
      .ms-opt:hover { background: var(--hover); }
      .ms-op { color: var(--muted); font-size: 9px; border: 1px solid var(--border); border-radius: 3px; padding: 0 3px; }
      /* status + busy spinner */
      #statusbar { padding: 8px 18px 0; display: flex; align-items: center; gap: 7px; min-height: 24px; }
      #status { color: var(--muted); font-size: 12px; }
      #status.err { color: var(--danger); }
      .spin { display: none; width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
      #statusbar.busy .spin { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* tree */
      .tree { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; padding: 10px 18px 20px; overflow: auto; flex: 1; }
      .tree.busy { opacity: .5; }
      .node { padding: 1px 0; }
      .row { display: flex; align-items: center; gap: 7px; padding: 1px 4px; border-radius: 4px; }
      .row:hover { background: var(--panel); }
      .twist { width: 12px; color: var(--muted); cursor: pointer; user-select: none; text-align: center; }
      .twist.leaf { visibility: hidden; }
      .name { white-space: nowrap; }
      .sig { color: var(--muted); font-size: 12px; }
      .edge { font-size: 10px; color: var(--muted); background: var(--chip); border-radius: 4px; padding: 0 5px; }
      .edge.heur { color: var(--warn); }
      .fanout { font-size: 10px; color: var(--warn); }
      .sites { font-size: 10px; color: var(--muted); }
      .eff { cursor: default; }
      /* predicate guard — full text in title, ellipsised on render */
      .guard { color: var(--warn); font-size: 11px; display: inline-flex; align-items: center; }
      .guardtxt { display: inline-block; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
      .haz { color: var(--danger); font-size: 11px; cursor: default; }
      .loc { color: var(--muted); font-size: 11px; margin-left: 6px; }
      /* subtree effect rollup — shown only when the branch is collapsed, so a folded node discloses what it touches */
      .rollup { display: none; margin-left: 6px; opacity: .75; gap: 2px; align-items: center; }
      .rollup .eff { font-size: 12px; }
      .collapsed > .row .rollup { display: inline-flex; }
      .children { margin-left: 15px; border-left: 1px solid var(--border); padding-left: 4px; }
      .collapsed > .children { display: none; }
      .trunc { color: var(--muted); font-style: italic; }
      .flat .frow { padding: 2px 0; }
      .flat .fname { color: var(--fg); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
