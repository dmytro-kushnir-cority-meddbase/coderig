<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rig — explorer</title>
    <style>
      /* Semantic design tokens — the ONLY place colors are defined. Both themes are declared; the active one
         is chosen by data-theme on <html> (set by the switcher), falling back to the OS preference. Components
         reference var(--x), never raw hex, so light/dark is a palette swap. (If this ports to React, the
         ThemeProvider reproduces exactly this: three modes, data-theme on the root, localStorage.) */
      :root, :root[data-theme="dark"] {
        --bg: #0e1116; --panel: #161b22; --border: #2a3038; --fg: #d6dde6;
        --muted: #8b98a5; --accent: #58a6ff; --chip: #21262d; --warn: #d29922;
        --btn-fg: #0e1116; --hover: #1c2230; --danger: #f85149;
      }
      :root[data-theme="light"] {
        --bg: #ffffff; --panel: #f4f6f9; --border: #d8dee5; --fg: #1f2733;
        --muted: #6a7684; --accent: #0969da; --chip: #eaeef2; --warn: #9a6700;
        --btn-fg: #ffffff; --hover: #eef2f6; --danger: #cf222e;
      }
      @media (prefers-color-scheme: light) {
        :root:not([data-theme]) {
          --bg: #ffffff; --panel: #f4f6f9; --border: #d8dee5; --fg: #1f2733;
          --muted: #6a7684; --accent: #0969da; --chip: #eaeef2; --warn: #9a6700;
          --btn-fg: #ffffff; --hover: #eef2f6; --danger: #cf222e;
        }
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--fg);
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex;
        align-items: baseline; gap: 14px; flex-wrap: wrap; }
      header h1 { font-size: 15px; margin: 0; letter-spacing: .5px; }
      header .store { color: var(--muted); font-size: 12px; }
      .placeholder { margin-left: auto; color: var(--warn); font-size: 11px; padding-right: 8px; }
      .theme { display: flex; gap: 2px; background: var(--panel); border: 1px solid var(--border);
        border-radius: 6px; padding: 2px; }
      .theme button { background: transparent; color: var(--muted); font-weight: 500; padding: 3px 9px;
        font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
      .theme button.on { background: var(--accent); color: var(--btn-fg); }
      main { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 51px); }
      aside { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
      .tabs { display: flex; border-bottom: 1px solid var(--border); }
      .tabs button { flex: 1; background: transparent; border: none; color: var(--muted); cursor: pointer;
        padding: 9px; font: inherit; font-size: 12px; border-bottom: 2px solid transparent; }
      .tabs button.on { color: var(--fg); border-bottom-color: var(--accent); }
      .pane { flex: 1; overflow: auto; padding: 12px; display: none; }
      .pane.on { display: block; }
      .run { background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
        padding: 8px 10px; margin-bottom: 8px; font-size: 12px; }
      .run .id { font-weight: 600; }
      .run.latest .id::after { content: " ← latest"; color: var(--accent); font-weight: 400; }
      .run .meta { color: var(--muted); margin-top: 3px; }
      #epFilter { width: 100%; margin-bottom: 10px; }
      .kind { margin-bottom: 4px; }
      .kind > .khead { cursor: pointer; user-select: none; font-size: 12px; padding: 4px 2px;
        color: var(--fg); display: flex; gap: 6px; align-items: center; }
      .kind > .khead .kcount { color: var(--muted); font-size: 11px; }
      .kind .klist { display: none; }
      .kind.open .klist { display: block; }
      .ep { font-size: 12px; padding: 3px 6px; border-radius: 4px; cursor: pointer;
        font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--muted); }
      .ep:hover { background: var(--hover); color: var(--fg); }
      section { display: flex; flex-direction: column; min-height: 0; }
      .controls { display: flex; gap: 8px; align-items: center; padding: 12px 18px; flex-wrap: wrap;
        border-bottom: 1px solid var(--border); position: relative; }
      input, select { background: var(--panel); border: 1px solid var(--border); color: var(--fg);
        border-radius: 6px; padding: 7px 10px; font: inherit; font-size: 13px; }
      .fromwrap { position: relative; flex: 1; min-width: 260px; }
      input#from { width: 100%; }
      button.go { background: var(--accent); border: none; color: var(--btn-fg); font-weight: 600;
        border-radius: 6px; padding: 7px 14px; cursor: pointer; }
      label.chk { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 5px; }
      input#filterTokens { width: 150px; }
      input#filterTokens:disabled { opacity: .5; }
      input#depth { width: 78px; }
      /* search dropdown */
      #results { position: absolute; top: 100%; left: 0; right: 0; z-index: 20; background: var(--panel);
        border: 1px solid var(--border); border-radius: 0 0 6px 6px; max-height: 320px; overflow: auto;
        display: none; box-shadow: 0 8px 20px rgba(0,0,0,.25); }
      #results.show { display: block; }
      .hit { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid var(--border);
        font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
      .hit:hover, .hit.active { background: var(--hover); }
      .hit .hkind { color: var(--accent); font-size: 10px; }
      .hit .hfile { color: var(--muted); font-size: 10px; display: block; }
      #status { color: var(--muted); font-size: 12px; padding: 8px 18px 0; min-height: 16px; }
      #status.err { color: var(--danger); }
      .tree { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px;
        padding: 10px 18px 20px; overflow: auto; flex: 1; }
      .node { padding: 1px 0; }
      .row { display: flex; align-items: center; gap: 7px; padding: 1px 4px; border-radius: 4px; }
      .row:hover { background: var(--panel); }
      .twist { width: 12px; color: var(--muted); cursor: pointer; user-select: none; text-align: center; }
      .twist.leaf { visibility: hidden; }
      .edge { font-size: 10px; color: var(--muted); background: var(--chip); border-radius: 4px; padding: 0 5px; }
      .edge.heur { color: var(--warn); }
      .fanout { font-size: 10px; color: var(--warn); }
      .sites { font-size: 10px; color: var(--muted); }
      .eff { cursor: default; }
      .loc { color: var(--muted); font-size: 11px; margin-left: 6px; }
      .children { margin-left: 15px; border-left: 1px solid var(--border); padding-left: 4px; }
      .collapsed > .children { display: none; }
      .trunc { color: var(--muted); font-style: italic; }
      .flat .frow { padding: 2px 0; }
      .flat .fname { color: var(--fg); }
    </style>
  </head>
  <body>
    <header>
      <h1>rig · explorer</h1>
      <span class="store" id="storeDir"></span>
      <span class="placeholder">vanilla UI (React parked)</span>
      <div class="theme" id="theme">
        <button data-theme="light">Light</button>
        <button data-theme="dark">Dark</button>
        <button data-theme="system">System</button>
      </div>
    </header>
    <main>
      <aside>
        <div class="tabs">
          <button data-tab="runs" class="on">Runs</button>
          <button data-tab="eps">Entry points</button>
        </div>
        <div class="pane on" id="pane-runs"><div id="runs">…</div></div>
        <div class="pane" id="pane-eps">
          <input id="epFilter" placeholder="filter entry points…" />
          <div id="eps">…</div>
        </div>
      </aside>
      <section>
        <div class="controls">
          <div class="fromwrap">
            <input id="from" placeholder="search a symbol, or type an entry-point / pattern…" autocomplete="off" />
            <div id="results"></div>
          </div>
          <select id="view" title="projection">
            <option value="paths">paths</option>
            <option value="full">full</option>
            <option value="effects">effects</option>
          </select>
          <select id="filterMode" title="effect filter (only XOR exclude — mutually exclusive)">
            <option value="none">no filter</option>
            <option value="only">only</option>
            <option value="exclude">exclude</option>
          </select>
          <input id="filterTokens" list="providerList" placeholder="providers/effects…" disabled
                 title="comma-separated; autocompletes from the rule set" />
          <datalist id="providerList"></datalist>
          <input id="depth" type="number" min="1" placeholder="depth" />
          <label class="chk"><input type="checkbox" id="async" /> async</label>
          <button class="go" id="go">Tree</button>
        </div>
        <div id="status"></div>
        <div class="tree" id="tree"></div>
      </section>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const status = (msg, err = false) => { const s = $("status"); s.textContent = msg; s.className = err ? "err" : ""; };
      const baseName = (p) => (p ? p.split(/[\\/]/).pop() : "");

      // ---- theme (light | dark | system) --------------------------------------------------------------
      function applyTheme(mode) {
        if (mode === "system") document.documentElement.removeAttribute("data-theme");
        else document.documentElement.setAttribute("data-theme", mode);
        localStorage.setItem("rig-theme", mode);
        for (const b of $("theme").children) b.classList.toggle("on", b.dataset.theme === mode);
      }
      $("theme").addEventListener("click", (e) => { if (e.target.dataset.theme) applyTheme(e.target.dataset.theme); });
      applyTheme(localStorage.getItem("rig-theme") || "system");

      // ---- left-rail tabs ------------------------------------------------------------------------------
      document.querySelector(".tabs").addEventListener("click", (e) => {
        const tab = e.target.dataset.tab; if (!tab) return;
        for (const b of document.querySelectorAll(".tabs button")) b.classList.toggle("on", b.dataset.tab === tab);
        $("pane-runs").classList.toggle("on", tab === "runs");
        $("pane-eps").classList.toggle("on", tab === "eps");
        if (tab === "eps") loadEntrypoints();
      });

      // ---- runs ----------------------------------------------------------------------------------------
      async function loadRuns() {
        try {
          const runs = await (await fetch("/api/runs")).json();
          if (!Array.isArray(runs) || runs.length === 0) { $("runs").textContent = "(no runs)"; return; }
          const latest = runs.find((r) => r.isLatest) || runs[0];
          $("storeDir").textContent = latest.solutionPath || "";
          $("runs").innerHTML = runs.map((r) => `
            <div class="run ${r.isLatest ? "latest" : ""}">
              <div class="id">${r.storeId}</div>
              <div class="meta">${r.commit || ""}${r.branch ? " (" + r.branch + ")" : ""}${r.dirty ? " +dirty" : ""}</div>
              <div class="meta">${r.symbols.toLocaleString()} symbols · ${r.references.toLocaleString()} refs</div>
            </div>`).join("");
        } catch (e) { $("runs").textContent = "error: " + e.message; }
      }

      // ---- entry points (browse) -----------------------------------------------------------------------
      let allEps = null;
      async function loadEntrypoints() {
        if (allEps) return;
        $("eps").textContent = "loading…";
        try { allEps = await (await fetch("/api/entrypoints")).json(); renderEps(""); }
        catch (e) { $("eps").textContent = "error: " + e.message; }
      }
      function renderEps(filter) {
        const f = filter.trim().toLowerCase();
        const match = allEps.filter((e) => !f || e.route.toLowerCase().includes(f) || e.fqn.toLowerCase().includes(f));
        const byKind = {};
        for (const e of match) (byKind[e.kind] ||= []).push(e);
        const CAP = 150;
        $("eps").innerHTML = Object.keys(byKind).sort().map((kind) => {
          const list = byKind[kind];
          const shown = list.slice(0, CAP).map((e) =>
            `<div class="ep" data-fqn="${encodeURIComponent(e.fqn)}" title="${e.fqn}">${e.route}</div>`).join("");
          const more = list.length > CAP ? `<div class="ep" style="cursor:default">… ${list.length - CAP} more (filter to narrow)</div>` : "";
          return `<div class="kind ${f ? "open" : ""}"><div class="khead">▸ ${kind} <span class="kcount">${list.length}</span></div><div class="klist">${shown}${more}</div></div>`;
        }).join("") || "(no matches)";
      }
      $("epFilter").addEventListener("input", (e) => allEps && renderEps(e.target.value));
      $("eps").addEventListener("click", (e) => {
        const head = e.target.closest(".khead");
        if (head) { head.parentElement.classList.toggle("open"); head.textContent = head.parentElement.classList.contains("open") ? head.textContent.replace("▸", "▾") : head.textContent.replace("▾", "▸"); return; }
        const ep = e.target.closest(".ep[data-fqn]");
        if (ep) { const fqn = decodeURIComponent(ep.dataset.fqn); $("from").value = fqn; loadTree(fqn); }
      });

      // ---- symbol search (dropdown under #from) --------------------------------------------------------
      let searchTimer = null, activeHit = -1;
      $("from").addEventListener("input", () => {
        clearTimeout(searchTimer);
        const q = $("from").value.trim();
        if (q.length < 2) { hideResults(); return; }
        searchTimer = setTimeout(() => doSearch(q), 220);
      });
      async function doSearch(q) {
        try {
          const hits = await (await fetch("/api/search?limit=15&q=" + encodeURIComponent(q))).json();
          if (!Array.isArray(hits) || !hits.length) { hideResults(); return; }
          activeHit = -1;
          $("results").innerHTML = hits.map((h, i) =>
            `<div class="hit" data-id="${encodeURIComponent(h.id)}" data-i="${i}"><span class="hkind">${h.kind}</span> ${h.name}<span class="hfile">${baseName(h.file)}:${h.line}</span></div>`).join("");
          $("results").classList.add("show");
        } catch { hideResults(); }
      }
      function hideResults() { $("results").classList.remove("show"); $("results").innerHTML = ""; activeHit = -1; }
      $("results").addEventListener("mousedown", (e) => {
        const hit = e.target.closest(".hit"); if (!hit) return;
        const id = decodeURIComponent(hit.dataset.id);
        $("from").value = id; hideResults(); loadTree(id);
      });
      // keyboard nav in the dropdown
      $("from").addEventListener("keydown", (e) => {
        const hits = [...$("results").querySelectorAll(".hit")];
        if ($("results").classList.contains("show") && hits.length) {
          if (e.key === "ArrowDown" || e.key === "ArrowUp") {
            e.preventDefault(); activeHit = (activeHit + (e.key === "ArrowDown" ? 1 : hits.length - 1)) % hits.length;
            hits.forEach((h, i) => h.classList.toggle("active", i === activeHit));
            hits[activeHit].scrollIntoView({ block: "nearest" }); return;
          }
          if (e.key === "Enter" && activeHit >= 0) {
            e.preventDefault(); const id = decodeURIComponent(hits[activeHit].dataset.id); $("from").value = id; hideResults(); loadTree(id); return;
          }
          if (e.key === "Escape") { hideResults(); return; }
        }
        if (e.key === "Enter") loadTree($("from").value.trim());
      });
      document.addEventListener("click", (e) => { if (!e.target.closest(".fromwrap")) hideResults(); });

      // ---- tree: fetch the canonical tree once, project + filter client-side ---------------------------
      let currentTree = null; // { from, roots } from the last /api/tree fetch
      async function loadTree(pattern) {
        if (!pattern) { status("enter a pattern", true); return; }
        hideResults();
        const params = new URLSearchParams({ from: pattern });
        const depth = $("depth").value.trim(); if (depth) params.set("depth", depth);
        if ($("async").checked) params.set("async", "true");
        status("querying…");
        try {
          const res = await fetch("/api/tree?" + params);
          const data = await res.json();
          if (!res.ok) { status(data.detail || data.title || "error", true); $("tree").innerHTML = ""; return; }
          if (!data.matched) { status(`no symbol matches '${pattern}'`, true); $("tree").innerHTML = ""; currentTree = null; return; }
          currentTree = data;
          render();
        } catch (e) { status(e.message, true); }
      }

      // --- effect filter: a single MODE (none | only | exclude) — mutually exclusive by construction — over
      // comma-separated tokens; a token matches a provider OR a provider:op (mirrors `rig`'s --only/--exclude).
      // The token list autocompletes from the rule set (/api/providers), so users pick real tokens.
      async function loadProviders() {
        try {
          const p = await (await fetch("/api/providers")).json();
          $("providerList").innerHTML = [...p.providers, ...p.providerOps].map((o) => `<option value="${o}">`).join("");
        } catch { /* filter still works via free text if this fails */ }
      }
      function tokenSet(id) { return $(id).value.split(/[,\s]+/).map((t) => t.trim().toLowerCase()).filter(Boolean); }
      function effMatch(e, t) { return t === e.provider.toLowerCase() || t === (e.provider + ":" + e.operation).toLowerCase(); }
      function filterEffects(effs) {
        const mode = $("filterMode").value;
        if (mode === "none") return effs;
        const toks = tokenSet("filterTokens");
        if (!toks.length) return effs;
        return mode === "only"
          ? effs.filter((e) => toks.some((t) => effMatch(e, t)))
          : effs.filter((e) => !toks.some((t) => effMatch(e, t)));
      }
      // the token input is meaningless without a mode — disable it when mode=none.
      $("filterMode").addEventListener("change", () => { $("filterTokens").disabled = $("filterMode").value === "none"; });
      // does this subtree carry any (filtered) effect? — the `paths` prune gate + the effectful-root gate.
      function subtreeHasEffect(n) {
        if (filterEffects(n.effects).length) return true;
        return n.children.some(subtreeHasEffect);
      }

      function effHtml(effects) {
        if (!effects.length) return "";
        return `<span class="effects">${effects.map((e) =>
          `<span class="eff" title="${e.provider}:${e.operation} ×${e.sites}">${e.glyph}${e.sites > 1 ? '<span class="sites">' + e.sites + "</span>" : ""}</span>`).join(" ")}</span>`;
      }
      function locHtml(n) { return n.file ? `<span class="loc">${baseName(n.file)}:${n.line}</span>` : ""; }

      // full/paths tree node (paths prunes branches with no downstream filtered effect)
      function nodeEl(node, prune) {
        const wrap = document.createElement("div"); wrap.className = "node";
        const kids = node.children.filter((c) => !prune || subtreeHasEffect(c));
        const hasKids = kids.length > 0;
        const row = document.createElement("div"); row.className = "row";
        const heur = node.dispatchBasis === "heuristic";
        const edgeTxt = node.edgeKind && node.edgeKind !== "entry" ? node.edgeKind + (heur ? " ~heuristic" : "") : "";
        row.innerHTML = `
          <span class="twist ${hasKids ? "" : "leaf"}">${hasKids ? "▾" : "•"}</span>
          <span class="name">${node.name}</span>
          ${edgeTxt ? `<span class="edge ${heur ? "heur" : ""}">${edgeTxt}</span>` : ""}
          ${node.fanout > 1 ? `<span class="fanout">×${node.fanout} fan-out</span>` : ""}
          ${node.callSites > 1 ? `<span class="sites">${node.callSites}×</span>` : ""}
          ${effHtml(filterEffects(node.effects))}
          ${node.truncated ? `<span class="trunc">⋯elided</span>` : ""}
          ${locHtml(node)}`;
        wrap.appendChild(row);
        if (hasKids) {
          const kdiv = document.createElement("div"); kdiv.className = "children";
          kids.forEach((c) => kdiv.appendChild(nodeEl(c, prune)));
          wrap.appendChild(kdiv);
          const twist = row.querySelector(".twist");
          twist.onclick = () => { wrap.classList.toggle("collapsed"); twist.textContent = wrap.classList.contains("collapsed") ? "▸" : "▾"; };
        }
        return wrap;
      }

      // effects view: flat DFS list of effectful methods (deduped by id) — "what does this EP actually DO"
      function collectEffectful(node, seen, out) {
        const fe = filterEffects(node.effects);
        if (fe.length && !seen.has(node.id)) { seen.add(node.id); out.push({ node, fe }); }
        node.children.forEach((c) => collectEffectful(c, seen, out));
      }

      function render() {
        if (!currentTree) return;
        const view = $("view").value;
        const tree = $("tree"); tree.innerHTML = ""; tree.className = "tree";
        if (view === "effects") {
          tree.classList.add("flat");
          const out = [], seen = new Set();
          currentTree.roots.forEach((r) => collectEffectful(r, seen, out));
          if (!out.length) { status(`${currentTree.from}: no effects (matching filters)`); return; }
          tree.innerHTML = out.map(({ node, fe }) =>
            `<div class="frow"><span class="fname">${node.name}</span> ${effHtml(fe)} ${locHtml(node)}</div>`).join("");
          status(`${currentTree.from} — ${out.length} effectful method(s)`);
          return;
        }
        const prune = view === "paths";
        const roots = prune ? currentTree.roots.filter(subtreeHasEffect) : currentTree.roots;
        if (!roots.length) { status(`${currentTree.from}: no effects reachable (matching filters) — try view=full`); return; }
        roots.forEach((r) => tree.appendChild(nodeEl(r, prune)));
        status(`${currentTree.from} — ${roots.length} root(s), view=${view}`);
      }

      // re-project on control change (no refetch); depth/async need a refetch via the Tree button.
      ["view", "filterMode", "filterTokens"].forEach((id) => $(id).addEventListener("input", () => currentTree && render()));
      $("go").onclick = () => loadTree($("from").value.trim());
      loadRuns();
      loadProviders();
    </script>
  </body>
</html>
